name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.ref == 'refs/heads/main' && vars.CI_DEPLOY == 'all' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check whether version already exists on npm
        id: npm_version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} is already published for ${PACKAGE_NAME}."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} is not published yet."
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm publish --access public --provenance

      - name: Skip publish for existing version
        if: steps.npm_version.outputs.already_published == 'true'
        run: echo "Skipping publish because this package version already exists on npm."
