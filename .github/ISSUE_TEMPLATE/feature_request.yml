name: Feature request
description: Suggest an improvement to the package, docs, SQL helpers, or example.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Context
      description: Share constraints, alternatives, or compatibility concerns.
