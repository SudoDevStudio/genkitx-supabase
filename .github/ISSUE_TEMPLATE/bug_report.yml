name: Bug report
description: Report a reproducible problem in the package, docs, SQL, or example.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Share minimal steps, config, SQL shape, and code snippets if possible.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Node, genkit, supabase-js, and package versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste the exact error message or stack trace.
